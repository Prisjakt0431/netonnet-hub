<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Netonnet 2026/27</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #0D2137;
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { display: flex; align-items: center; gap: 14px; }

    .header-meta { text-align: right; font-size: 13px; color: rgba(255,255,255,0.6); }
    .header-meta strong { display: block; font-size: 15px; color: #ffffff; margin-bottom: 2px; }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .page-title { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .page-subtitle { color: #666; font-size: 14px; margin-bottom: 28px; }

    /* TAB NAV */
    .tab-nav {
      display: flex;
      border-bottom: 2px solid #e4e8ef;
      margin-bottom: 28px;
      gap: 4px;
    }

    .tab-btn {
      padding: 10px 22px;
      font-size: 15px;
      font-weight: 600;
      color: #888;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.15s;
    }

    .tab-btn:hover { color: #0D2137; }

    .tab-btn.active {
      color: #0D2137;
      border-bottom-color: #0D2137;
    }

    .tab-flag { font-size: 18px; }

    /* TAB CONTENT */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* SUB-SECTION */
    .sub-section { margin-bottom: 32px; }

    .sub-section-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e4e8ef;
    }

    /* CAMPAIGN CARDS */
    .campaign-grid { display: grid; gap: 14px; }

    .campaign-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e4e8ef;
      padding: 20px 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      transition: box-shadow 0.2s;
    }

    .campaign-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

    .campaign-type {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 7px;
    }

    .type-aon { background: #e8f4fd; color: #1a7cc4; }
    .type-special { background: #fff0e6; color: #c2500a; }
    .type-pm { background: #eaf3de; color: #3b6d11; }

    .campaign-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .campaign-period { font-size: 13px; color: #888; margin-bottom: 13px; }

    .products { display: flex; gap: 8px; flex-wrap: wrap; }

    .product-chip {
      background: #f4f6f9;
      border: 1px solid #dde1e9;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
    }

    .product-chip .label { font-weight: 600; color: #444; }
    .product-chip .amount { color: #666; margin-left: 4px; }

    .card-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 9px;
    }

    .status-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 11px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-live { background: #e6f9f0; color: #16a34a; }
    .status-live::before {
      content: '';
      width: 7px; height: 7px;
      background: #16a34a;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    .status-ended { background: #f0f0f0; color: #888; }

    .status-confirmed { background: #fff7e6; color: #b45309; }
    .status-confirmed::before {
      content: '';
      width: 7px; height: 7px;
      background: #f59e0b;
      border-radius: 50%;
    }

    .status-planned { background: #f1f5f9; color: #64748b; }
    .status-planned::before {
      content: '';
      width: 7px; height: 7px;
      background: #94a3b8;
      border-radius: 50%;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .btn-report {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #E8334A;
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-report:hover { background: #c9273d; }
    .btn-report svg { width: 14px; height: 14px; }

    .total-row {
      background: #f8f9fc;
      border-radius: 10px;
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
      border: 1px solid #e4e8ef;
    }

    .total-label { font-size: 13px; font-weight: 600; color: #666; }
    .total-amounts { display: flex; gap: 24px; }
    .total-item { text-align: right; }
    .total-item .t-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
    .total-item .t-value { font-size: 15px; font-weight: 700; color: #1a1a2e; }

    footer {
      text-align: center;
      padding: 28px;
      color: #bbb;
      font-size: 12px;
      border-top: 1px solid #e4e8ef;
      margin-top: 20px;
    }

    /* Delivery bars */
    .delivery-section {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #f0f0f0;
    }
    .delivery-section::before {
      content: 'Levererat';
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 6px;
    }
    .delivery-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      font-size: 12px;
    }
    .delivery-prod-name {
      width: 96px;
      color: #666;
      font-size: 11px;
      flex-shrink: 0;
    }
    .delivery-track {
      flex: 1;
      height: 6px;
      background: #e8e8e8;
      border-radius: 3px;
      overflow: hidden;
    }
    .delivery-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .delivery-fill.good { background: #22c55e; }
    .delivery-fill.warn { background: #22c55e; }
    .delivery-fill.bad  { background: #22c55e; }
    .delivery-pct {
      width: 42px;
      text-align: right;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .delivery-pct.good { color: #16a34a; }
    .delivery-pct.warn { color: #16a34a; }
    .delivery-pct.bad  { color: #16a34a; }
    .delivery-ctr { font-size:10px; color:#999; width:62px; text-align:right; flex-shrink:0; }

    /* Underleverans tab */
    .under-grid { display: grid; gap: 16px; }
    .under-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px 20px;
    }
    .under-card-header { margin-bottom: 12px; }
    .under-prod-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
      border-bottom: 1px solid #f5f5f5;
      font-size: 13px;
    }
    .under-prod-row:last-child { border-bottom: none; }
    .under-prod-name { flex: 1; color: #555; }
    .under-diff { font-size: 12px; color: #888; min-width: 100px; text-align: right; }
    .under-total {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 2px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .under-total-label { font-size: 12px; color: #999; }
    .under-total-value { font-size: 18px; font-weight: 700; }
    .under-total-value.bad  { color: #dc2626; }
    .under-total-value.good { color: #16a34a; }
    .under-empty {
      text-align: center;
      color: #aaa;
      padding: 48px 0;
      font-size: 15px;
    }
    .export-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 7px 14px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
    }
    .export-btn:hover { background: #f3f4f6; }
    .under-loading {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 14px;
    }
    .agg-table { width:100%; border-collapse:collapse; font-size:13px; }
    .agg-table th { text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#999; padding:0 10px 8px 0; border-bottom:1px solid #e4e8ef; }
    .agg-table td { padding:10px 10px 10px 0; border-bottom:1px solid #f5f5f5; color:#333; }
    .agg-table tfoot td { font-weight:700; border-top:2px solid #e4e8ef; border-bottom:none; padding-top:12px; color:#1a1a2e; }
    .agg-table td:not(:first-child), .agg-table th:not(:first-child) { text-align:right; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <img alt="Prisjakt" src="https://cdn.pji.nu/g/rfe/logos/logo_se_v2_light.svg" style="height:32px;"/>
  </div>
  <div class="header-meta">
    <strong>Netonnet 2026/27</strong>
    Kampanjöversikt &middot; Uppdaterad <span id="updatedAt">–</span>
  </div>
</header>

<main>
  <div class="page-title">Netonnet 2026/27</div>
  <p class="page-subtitle">Klicka på &quot;Se rapport&quot; för att följa leverans i realtid via Gotom.</p>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="showTab('se', this)"><span class="tab-flag">🇸🇪</span> Sverige</button>
    <button class="tab-btn" onclick="showTab('no', this)"><span class="tab-flag">🇳🇴</span> Norge</button>
  </div>

  <div class="tab-content active" id="tab-se">
    <div class="tab-nav" style="margin-bottom: 20px;">
      <button class="tab-btn active" onclick="showSubTab('subtab-se-aon', this)">AON &ndash; Always-On</button>
      <button class="tab-btn" onclick="showSubTab('subtab-se-pm', this)">PM &ndash; Partner Marketing</button>
      <button class="tab-btn" onclick="showSubTab('subtab-se-under', this)">Underleverans</button>
      <button class="tab-btn" onclick="showSubTab('subtab-se-agg', this)">Aggregerat resultat</button>
    </div>
    <div class="sub-section" id="subtab-se-aon" style="display:block;">
      <div class="campaign-grid" id="cards-se-aon"></div>
    </div>
    <div class="sub-section" id="subtab-se-pm" style="display:none;">
      <div class="campaign-grid" id="cards-se-pm"></div>
    </div>
    <div class="sub-section" id="subtab-se-under" style="display:none;">
      <button class="export-btn" onclick="exportAllCSV('se')">&#8681; Exportera total CSV</button>
      <div id="under-se-content" class="under-loading">Laddar&hellip;</div>
    </div>
    <div class="sub-section" id="subtab-se-agg" style="display:none;">
      <div id="agg-se-content" class="under-loading">Laddar&hellip;</div>
    </div>
  </div>

  <div class="tab-content" id="tab-no">
    <div class="tab-nav" style="margin-bottom: 20px;">
      <button class="tab-btn active" onclick="showSubTab('subtab-no-aon', this)">AON &ndash; Always-On</button>
      <button class="tab-btn" onclick="showSubTab('subtab-no-pm', this)">PM &ndash; Partner Marketing</button>
      <button class="tab-btn" onclick="showSubTab('subtab-no-under', this)">Underleverans</button>
      <button class="tab-btn" onclick="showSubTab('subtab-no-agg', this)">Aggregerat resultat</button>
    </div>
    <div class="sub-section" id="subtab-no-aon" style="display:block;">
      <div class="campaign-grid" id="cards-no-aon"></div>
    </div>
    <div class="sub-section" id="subtab-no-pm" style="display:none;">
      <div class="campaign-grid" id="cards-no-pm"></div>
    </div>
    <div class="sub-section" id="subtab-no-under" style="display:none;">
      <button class="export-btn" onclick="exportAllCSV('no')">&#8681; Exportera total CSV</button>
      <div id="under-no-content" class="under-loading">Laddar&hellip;</div>
    </div>
    <div class="sub-section" id="subtab-no-agg" style="display:none;">
      <div id="agg-no-content" class="under-loading">Laddar&hellip;</div>
    </div>
  </div>

  <footer>Netonnet rapporteringshub &middot; byggd av Prisjakt</footer>
</main>

<script>
let DELIVERY = {};
const REPORT_ICON = '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:14px;height:14px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path></svg>';

const MONTHS_FULL = ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'];
const MONTHS_ABBR = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];

function monthSortKey(name) {
  const lower = name.toLowerCase();
  let best = 99, bestPos = 1e9;
  MONTHS_FULL.forEach((m, i) => { const p = lower.indexOf(m); if (p >= 0 && p < bestPos) { bestPos = p; best = i + 1; } });
  if (best === 99) {
    MONTHS_ABBR.forEach((m, i) => {
      const re = new RegExp('\\b' + m + '\\b');
      const match = lower.match(re);
      if (match && match.index < bestPos) { bestPos = match.index; best = i + 1; }
    });
  }
  return best;
}

function periodLabel(name) {
  const parts = name.split('–');
  const tail = (parts.length > 1 ? parts[parts.length - 1] : name).trim();
  return tail + ' 2026';
}

function deliveryClass(pct) {
  if (pct === null || pct === undefined) return 'warn';
  if (pct >= 95) return 'good';
  if (pct >= 75) return 'warn';
  return 'bad';
}

function statusInfo(products) {
  const vals = Object.values(products || {});
  const pcts = vals.map(p => p.pct).filter(p => p !== null && p !== undefined);
  if (!vals.length || !pcts.length) return { cls: 'status-confirmed', label: 'Bokad' };
  const allEnded = pcts.every(p => p >= 99);
  if (allEnded) return { cls: 'status-ended', label: 'Avslutat' };
  const anyStarted = pcts.some(p => p > 0);
  if (anyStarted) return { cls: 'status-live', label: 'Pågår' };
  return { cls: 'status-confirmed', label: 'Bokad' };
}

function fmtAmount(v, currency) {
  return Math.round(v || 0).toLocaleString('sv-SE') + ' ' + currency;
}

function reportUrl(id, token) {
  return 'https://prisjakt.gotom.io/reporting-task-report/' + id + '/' + token;
}

async function loadDelivery() {
  try {
    const resp = await fetch('delivery.json?v=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    DELIVERY = data.campaigns || {};
    document.getElementById('updatedAt').textContent = data.updated ? new Date(data.updated).toLocaleString('sv-SE', { dateStyle: 'short', timeStyle: 'short' }) : '–';
    renderCards('se', 'aon');
    renderCards('se', 'pm');
    renderCards('no', 'aon');
    renderCards('no', 'pm');
    buildUnderTab('se');
    buildUnderTab('no');
    buildAggTab('se');
    buildAggTab('no');
  } catch (e) {
    console.warn('Could not load delivery.json:', e);
  }
}

function campaignsFor(market, type) {
  return Object.entries(DELIVERY)
    .filter(([id, c]) => c.market === market && (c.type || 'aon') === type)
    .sort((a, b) => monthSortKey(a[1].name) - monthSortKey(b[1].name));
}

function renderCards(market, type) {
  const el = document.getElementById('cards-' + market + '-' + type);
  if (!el) return;
  const list = campaignsFor(market, type);
  if (!list.length) { el.innerHTML = '<p style="color:#aaa;font-size:13px;">Inga kampanjer ännu.</p>'; return; }
  const currency = market === 'se' ? 'kr' : 'NOK';
  el.innerHTML = list.map(([id, c]) => campaignCard(id, c, currency, type)).join('');
}

function campaignCard(id, c, currency, type) {
  const products = c.products || {};
  const chips = Object.entries(products).map(([name, p]) => (
    '<div class="product-chip"><span class="label">' + escapeHtml(name) + '</span><span class="amount">' + fmtAmount(p.booked, currency) + '</span></div>'
  )).join('');

  const bars = Object.entries(products)
    .filter(([, p]) => p.pct !== null && p.pct !== undefined)
    .map(([name, p]) => {
      const cls = deliveryClass(p.pct);
      const width = Math.min(Math.max(p.pct, 0), 100);
      const ctrLabel = (p.ctr !== null && p.ctr !== undefined) ? '<span class="delivery-ctr">' + p.ctr.toFixed(2) + '% CTR</span>' : '';
      return '<div class="delivery-bar"><span class="delivery-prod-name">' + escapeHtml(name) + '</span>' +
        '<div class="delivery-track"><div class="delivery-fill ' + cls + '" style="width:' + width + '%"></div></div>' +
        '<span class="delivery-pct ' + cls + '">' + p.pct.toFixed(1) + '%</span>' + ctrLabel + '</div>';
    }).join('');

  const deliverySection = bars ? '<div class="delivery-section"><div class="delivery-bars">' + bars + '</div></div>' : '';
  const status = statusInfo(products);
  const typeLabel = type === 'pm' ? 'Partner Marketing' : 'Always-On';
  const typeCls = type === 'pm' ? 'type-pm' : 'type-aon';
  const reportLink = REPORT_URLS[id] ? '<a class="btn-report" href="' + REPORT_URLS[id] + '" target="_blank" rel="noopener">' + REPORT_ICON + ' Se rapport</a>' : '';

  return '<div class="campaign-card" data-report-id="' + id + '">' +
    '<div>' +
      '<span class="campaign-type ' + typeCls + '">' + typeLabel + '</span>' +
      '<div class="campaign-name">' + escapeHtml(c.name) + '</div>' +
      '<div class="campaign-period">' + escapeHtml(periodLabel(c.name)) + '</div>' +
      '<div class="products">' + chips + '</div>' +
      deliverySection +
    '</div>' +
    '<div class="card-actions">' +
      '<span class="status-badge ' + status.cls + '">' + status.label + '</span>' +
      reportLink +
    '</div>' +
  '</div>';
}

function buildUnderTab(market) {
  const el = document.getElementById('under-' + market + '-content');
  if (!el) return;
  const currency = market === 'se' ? 'kr' : 'NOK';
  const under = [];
  Object.entries(DELIVERY).forEach(([id, c]) => {
    if (c.market !== market) return;
    const products = c.products || {};
    if (!Object.keys(products).length) return;
    const status = statusInfo(products);
    if (status.cls === 'status-live') return;
    const hasUnder = Object.values(products).some(p => p.pct !== null && p.pct !== undefined && p.pct < 100);
    if (!hasUnder) return;
    under.push([id, c]);
  });

  if (!under.length) { el.className = 'under-empty'; el.innerHTML = 'Inga avslutade kampanjer med underleverans just nu.'; return; }
  el.className = '';
  el.innerHTML = '<div class="under-grid">' + under.map(([id, c]) => {
    let totalDiff = 0;
    const rows = Object.entries(c.products).map(([name, p]) => {
      const diff = (p.booked || 0) - (p.delivered || 0);
      totalDiff += diff;
      return '<div class="under-prod-row"><span class="under-prod-name">' + escapeHtml(name) + '</span><span class="under-diff">' + fmtAmount(p.delivered, currency) + ' av ' + fmtAmount(p.booked, currency) + '</span></div>';
    }).join('');
    const diffCls = totalDiff > 0 ? 'bad' : 'good';
    return '<div class="under-card">' +
      '<div class="under-card-header"><strong>' + escapeHtml(c.name) + '</strong></div>' +
      rows +
      '<div class="under-total"><span class="under-total-label">Total avvikelse</span><span class="under-total-value ' + diffCls + '">' + fmtAmount(totalDiff, currency) + '</span></div>' +
    '</div>';
  }).join('') + '</div>';
}

function buildAggTab(market) {
  const el = document.getElementById('agg-' + market + '-content');
  if (!el) return;
  const currency = market === 'se' ? 'kr' : 'NOK';
  const types = [{ key: 'aon', label: 'AON – Always-On' }, { key: 'pm', label: 'PM – Partner Marketing' }];
  let html = '';
  let anyData = false;

  types.forEach(t => {
    const list = Object.values(DELIVERY).filter(c => c.market === market && (c.type || 'aon') === t.key);
    if (!list.length) return;
    anyData = true;
    const prodAgg = {};
    let nStarted = 0;
    list.forEach(c => {
      const products = c.products || {};
      if (!Object.keys(products).length) return;
      const started = Object.values(products).some(p => p.pct !== null && p.pct !== undefined && p.pct > 0);
      if (started) nStarted++;
      Object.entries(products).forEach(([name, p]) => {
        if (!prodAgg[name]) prodAgg[name] = { booked: 0, delivered: 0, clicks: 0, impressions: 0 };
        prodAgg[name].booked += p.booked || 0;
        prodAgg[name].delivered += p.delivered || 0;
        prodAgg[name].clicks += p.clicks || 0;
        prodAgg[name].impressions += p.impressions || 0;
      });
    });

    let rows = '', totalBooked = 0, totalDelivered = 0, totalClicks = 0;
    Object.entries(prodAgg).forEach(([name, a]) => {
      totalBooked += a.booked; totalDelivered += a.delivered; totalClicks += a.clicks;
      const pct = a.booked > 0 ? (a.delivered / a.booked * 100).toFixed(1) + '%' : '–';
      const ctr = a.impressions > 0 ? (a.clicks / a.impressions * 100).toFixed(2) + '%' : '–';
      rows += '<tr><td>' + escapeHtml(name) + '</td><td>' + fmtAmount(a.booked, currency) + '</td><td>' + fmtAmount(a.delivered, currency) + '</td><td>' + pct + '</td><td>' + a.clicks.toLocaleString('sv-SE') + '</td><td>' + ctr + '</td></tr>';
    });
    const totalPct = totalBooked > 0 ? (totalDelivered / totalBooked * 100).toFixed(1) + '%' : '–';

    html += '<h4 style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#999;margin:20px 0 10px;">' + t.label + '</h4>';
    if (nStarted === 0) html += '<p style="font-size:13px;color:#aaa;margin-bottom:8px;">Inga kampanjer har startat ännu.</p>';
    html += '<div class="under-card" style="overflow-x:auto;margin-bottom:8px;"><table class="agg-table">' +
      '<thead><tr><th>Produkt</th><th>Bokat totalt</th><th>Levererat</th><th>Leverans %</th><th>Klick</th><th>Snitt CTR</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
      '<tfoot><tr><td>Totalt</td><td>' + fmtAmount(totalBooked, currency) + '</td><td>' + fmtAmount(totalDelivered, currency) + '</td><td>' + totalPct + '</td><td>' + totalClicks.toLocaleString('sv-SE') + '</td><td></td></tr></tfoot>' +
    '</table></div>';
  });

  if (!anyData) { el.className = 'under-empty'; el.innerHTML = 'Ingen kampanjdata ännu.'; return; }
  el.className = '';
  el.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}

function toCSVRow(fields) {
  return fields.map(f => '"' + String(f).replace(/"/g, '""') + '"').join(',') + '\r\n';
}

function downloadCSV(filename, rows) {
  const blob = new Blob([rows.join('')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function exportAllCSV(market) {
  const currency = market === 'se' ? 'kr' : 'NOK';
  const rows = [toCSVRow(['Kampanj', 'Typ', 'Produkt', 'Bokad (' + currency + ')', 'Levererad (' + currency + ')', 'Leverans %', 'Avvikelse (' + currency + ')'])];
  Object.values(DELIVERY).filter(c => c.market === market).forEach(c => {
    Object.entries(c.products || {}).forEach(([name, p]) => {
      const pctStr = (p.pct !== null && p.pct !== undefined) ? p.pct.toFixed(1) + '%' : '';
      rows.push(toCSVRow([c.name, (c.type || 'aon').toUpperCase(), name, Math.round(p.booked || 0), Math.round(p.delivered || 0), pctStr, Math.round((p.booked || 0) - (p.delivered || 0))]));
    });
  });
  downloadCSV('netonnet_' + market + '_total.csv', rows);
}

function showTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  btn.closest('.tab-nav').querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

function showSubTab(id, btn) {
  const nav = btn.closest('.tab-nav');
  const container = nav.parentElement;
  container.querySelectorAll('.sub-section').forEach(el => el.style.display = 'none');
  document.getElementById(id).style.display = 'block';
  nav.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  btn.classList.add('active');
}
